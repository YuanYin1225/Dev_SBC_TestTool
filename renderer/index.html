<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>SBC电磁阀驱动器测试工具 V3.2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ===== Top Bar: Serial Control ===== -->
  <div id="topBar">
    <div class="bar-title">SBC 电磁阀驱动器测试工具 <span class="ver">V3.2</span></div>
    <div class="bar-controls">
      <select id="portSelect">
        <option value="">-- 选择串口 --</option>
      </select>
      <input type="text" id="portManual" placeholder="或手动输入 COM3" style="width:120px" spellcheck="false">
      <button id="btnRefresh" title="刷新串口列表">⟳</button>
      <button id="btnConnect" class="btn-connect">连接</button>
      <span id="portStatus" class="status-dot disconnected"></span>
    </div>
  </div>

  <!-- ===== Main Layout ===== -->
  <div id="mainContainer">

    <!-- Left Panel: Channel Control -->
    <div id="leftPanel">
      <div class="panel-header">通道控制</div>
      <div class="panel-toolbar">
        <button id="btnAllOn" class="btn-sm">全部开启</button>
        <button id="btnAllOff" class="btn-sm btn-danger">全部关闭</button>
        <button id="btnRow1" class="btn-sm">仅1路</button>
        <button id="btnRow2" class="btn-sm">仅2路</button>
      </div>
      <div id="channelGrid">
        <!-- Generated by JS -->
      </div>
      <button id="btnSend" class="btn-primary" disabled>发送控制指令</button>
      <div id="cmdPreview"></div>
    </div>

    <!-- Center Panel: Real-time Data + Actions -->
    <div id="centerPanel">
      <!-- Real-time Data -->
      <div class="panel-card">
        <div class="panel-header">实时数据监控</div>
        <div class="rt-grid">
          <div class="rt-item">
            <div class="rt-label">系统电压 V_12VT</div>
            <div class="rt-value" id="valV12">--</div>
            <div class="rt-unit">V</div>
          </div>
          <div class="rt-item">
            <div class="rt-label">电磁阀电压 V_DCF</div>
            <div class="rt-value" id="valVDCF">--</div>
            <div class="rt-unit">V</div>
          </div>
          <div class="rt-item">
            <div class="rt-label">电磁阀电流 I_DCF</div>
            <div class="rt-value" id="valIDCF">--</div>
            <div class="rt-unit">mA</div>
          </div>
          <div class="rt-item">
            <div class="rt-label">MCU电流 I_MCU</div>
            <div class="rt-value" id="valIMCU">--</div>
            <div class="rt-unit">mA</div>
          </div>
        </div>
        <div class="rt-controls">
          <label class="auto-label">
            <input type="checkbox" id="chkAutoQuery"> 自动轮询 (1s)
          </label>
          <button id="btnQueryRT" class="btn-sm btn-primary">查询实时数据</button>
        </div>
        <div id="faultInfo" class="fault-info"></div>
      </div>

      <!-- Quick Actions -->
      <div class="panel-card">
        <div class="panel-header">快捷操作</div>
        <div class="action-row">
          <button class="btn-action" data-action="selftest">自 检</button>
          <button class="btn-action" data-action="hardtest">所有通道开启1s</button>
        </div>
        <!-- 固件版本 -->
        <div class="action-row">
          <button class="btn-action" data-action="queryFW">固件版本</button>
          <span id="fwVersion" class="info-tag">--</span>
        </div>
        <!-- 故障检测 -->
        <div class="action-row">
          <button class="btn-action" data-action="faultOn">故障检测开</button>
          <button class="btn-action" data-action="faultOff">故障检测关</button>
          <button class="btn-action" data-action="queryLED">故障灯查询</button>
          <span id="ledStatus" class="info-tag">--</span>
        </div>
        <div class="action-grid">
          <button class="btn-action btn-danger-action" data-action="bootloader">设备复位/升级</button>
        </div>
        <div id="actionResult"></div>
      </div>

      <!-- Manual Command -->
      <div class="panel-card">
        <div class="panel-header">手动指令</div>
        <div class="manual-cmd">
          <input type="text" id="txtManualCmd" placeholder="例: 55 AA 00 07 60" spellcheck="false">
          <button id="btnSendManual" class="btn-sm btn-primary">发送</button>
        </div>
      </div>

      <!-- Command Generator -->
      <div class="panel-card">
        <div class="panel-header">
          <span>指令生成器</span>
          <span class="header-hint">穷举 N 通道组合</span>
        </div>
        <div class="gen-controls">
          <label>通道数 N:</label>
          <input type="number" id="genChCount" value="2" min="2" max="14" style="width:60px">
          <button id="btnGenerate" class="btn-sm btn-primary">生成指令</button>
          <select id="genFormat" style="width:80px">
            <option value="csv">CSV</option>
            <option value="txt">TXT</option>
          </select>
        </div>
        <div id="genProgress" style="display:none">
          <div class="progress-bar"><div class="progress-fill" id="genFill"></div></div>
          <div class="progress-text" id="genText"></div>
        </div>
        <div id="genResult" style="display:none">
          <span id="genCount"></span>
        </div>
      </div>

      <!-- Batch Send -->
      <div class="panel-card" id="batchSendCard">
        <div class="panel-header">
          <span>批量发送</span>
          <button id="btnLoadCSV" class="btn-xs">加载CSV</button>
          <input type="file" id="fileCSV" accept=".csv,.txt" multiple style="display:none">
        </div>
        <div id="batchInfo" class="batch-info" style="display:none">
          <span id="batchFileName"></span>
          <span id="batchTotal"></span>
        </div>
        <div id="batchProgress" style="display:none">
          <div class="progress-bar"><div class="progress-fill" id="batchFill"></div></div>
          <div class="progress-text" id="batchText"></div>
          <div class="batch-cmd-preview" id="batchCmdPreview"></div>
        </div>
        <div class="batch-controls" id="batchControls" style="display:none">
          <button id="btnBatchStart" class="btn-sm btn-primary">▶ 开始</button>
          <button id="btnBatchPause" class="btn-sm">⏸ 暂停</button>
          <button id="btnBatchStop" class="btn-sm btn-danger">⏹ 停止</button>
          <label>重复(ms): <input type="number" id="batchRepeatMs" value="200" min="100" max="10000" style="width:65px" title="保持期间重复发送间隔"></label>
          <label>保持(s): <input type="number" id="batchHoldSec" value="5" min="0" max="3600" style="width:55px" title="每组指令保持时间"></label>
          <label>间隔(s): <input type="number" id="batchGapSec" value="2" min="0" max="3600" style="width:55px" title="两组指令之间等待时间"></label>
        </div>
      </div>
    </div>

    <!-- Right Panel: Log -->
    <div id="rightPanel">
      <div class="panel-header">
        <span>通讯日志</span>
        <button id="btnClearLog" class="btn-xs">清空</button>
      </div>
      <div id="logArea">
        <div class="log-empty">等待串口数据...</div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
